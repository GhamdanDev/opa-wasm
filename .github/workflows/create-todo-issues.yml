name: "Create Issues from TODOs"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  create-todo-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create issues from TODO comments
        uses: alstr/todo-to-issue-action@v4
        with:
          AUTO_ASSIGN: true
          CLOSE_ISSUES: true
