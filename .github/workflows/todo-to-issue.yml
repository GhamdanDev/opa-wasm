name: "Auto TODO/FIXME to GitHub Issue"

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  todo-to-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: TODO to Issue
        uses: alstr/todo-to-issue-action@v4
        with:
          CLOSE_ISSUES: true
          AUTO_ASSIGN: true
          ISSUE_TEMPLATE: |
            ### TODO/FIXME Found

            **File:** `{{ FILE }}`
            **Line:** {{ LINE }}

            ```{{ LANGUAGE }}
            {{ BODY }}
            ```

            ---
            _This issue was automatically created from a TODO/FIXME/HACK comment in the code._
